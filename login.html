<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in - Madrasa</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='52'>&#9770;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
    <div id="site-nav"></div>

    <section class="section">
        <div class="container" style="max-width: 460px">
            <!-- Reset-password panel (shown only when the URL has a Supabase recovery hash) -->
            <div class="card" style="margin-top: 32px; display:none" id="reset-card">
                <h1 style="margin-bottom: 4px"><span style="color: var(--gold-500)">&#9770;</span> Set a new password</h1>
                <p class="text-muted" style="margin-top: 0">Type your new password below to finish the reset.</p>
                <form class="form" id="reset-form" style="margin-top: 16px">
                    <label>New password (min 8 chars)
                        <input required minlength="8" type="password" name="new_password" autocomplete="new-password">
                    </label>
                    <label>Confirm new password
                        <input required minlength="8" type="password" name="confirm_password" autocomplete="new-password">
                    </label>
                    <div id="reset-alert"></div>
                    <button class="btn btn-primary btn-lg" type="submit" id="reset-btn">Set new password</button>
                </form>
            </div>

            <!-- Normal sign-in panel -->
            <div class="card" style="margin-top: 32px" id="signin-card">
                <h1 style="margin-bottom: 4px"><span style="color: var(--gold-500)">&#9770;</span> Sign in</h1>
                <p class="text-muted" style="margin-top: 0">Admin &middot; Teacher &middot; Student &middot; Parent</p>

                <form class="form" id="login-form" style="margin-top: 20px">
                    <label>Username or email
                        <input required type="text" name="identifier" autocomplete="username" placeholder="ahmed.teacher">
                    </label>
                    <label>Password
                        <input required type="password" name="password" autocomplete="current-password">
                    </label>
                    <div id="login-alert"></div>
                    <button class="btn btn-primary btn-lg" type="submit" id="login-btn">Sign in</button>
                </form>

                <p class="text-muted" style="font-size:13px; margin-top:18px">
                    Accounts are created by the school admin. If you don't have one yet, please contact the office.
                </p>
            </div>

            <p class="text-muted text-center" style="margin-top: 16px; font-size: 13px" id="forgot-row">
                Forgot password? <a href="#" id="forgot-link">Send reset email</a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>
    <script src="assets/js/partials.js"></script>
    <script src="assets/js/site.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module">
        import { supabase, signIn, currentProfile } from './assets/js/supabase-client.js';
        import { usernameToEmail } from './assets/js/modules/admin-users.js';

        // ---------------------------------------------------------------
        // Detect Supabase password-recovery flow.
        // The reset link from email lands here with a URL fragment like:
        //   #access_token=...&type=recovery&...
        // Supabase's client (detectSessionInUrl:true) will turn that into a
        // short-lived session, but we must NOT auto-redirect; instead show
        // the password reset form.
        // ---------------------------------------------------------------
        const hash = new URLSearchParams(location.hash.replace(/^#/, ''));
        const isRecovery = hash.get('type') === 'recovery';

        if (isRecovery) {
            // Show the reset card and hide the normal sign-in card
            document.getElementById('reset-card').style.display = '';
            document.getElementById('signin-card').style.display = 'none';
            document.getElementById('forgot-row').style.display  = 'none';
        } else {
            // Already logged in (and not in recovery flow)? Skip straight to the app.
            currentProfile().then(p => { if (p) location.href = 'app.html'; });
            // Friendly note if the idle watcher brought them here.
            const search = new URLSearchParams(location.search);
            if (search.get('reason') === 'idle') {
                document.getElementById('login-alert').innerHTML =
                    '<div class="alert alert-info">You were signed out after 30 minutes of inactivity. Please sign in again.</div>';
            }
        }

        // ---- Reset-password form (recovery flow) ----------------------
        const resetForm  = document.getElementById('reset-form');
        const resetAlert = document.getElementById('reset-alert');
        const resetBtn   = document.getElementById('reset-btn');
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            resetAlert.innerHTML = '';
            const fd = new FormData(resetForm);
            const p1 = fd.get('new_password');
            const p2 = fd.get('confirm_password');
            if (p1 !== p2) {
                resetAlert.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>';
                return;
            }
            resetBtn.disabled = true; resetBtn.textContent = 'Updating...';
            try {
                const { error } = await supabase.auth.updateUser({ password: p1 });
                if (error) throw error;
                resetAlert.innerHTML = '<div class="alert alert-success">Password updated. Redirecting...</div>';
                // Clean the hash so a reload doesn't re-trigger recovery flow
                history.replaceState(null, '', location.pathname);
                setTimeout(() => { location.href = 'app.html'; }, 1200);
            } catch (err) {
                resetAlert.innerHTML = '<div class="alert alert-danger">' + (err.message || 'Update failed.') + '</div>';
            } finally {
                resetBtn.disabled = false; resetBtn.textContent = 'Set new password';
            }
        });

        // ---- Normal sign-in -------------------------------------------
        const loginForm  = document.getElementById('login-form');
        const loginAlert = document.getElementById('login-alert');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginAlert.innerHTML = '';
            const fd = new FormData(loginForm);
            try {
                const email = usernameToEmail(fd.get('identifier'));
                await signIn(email, fd.get('password'));
                location.href = 'app.html';
            } catch (err) {
                loginAlert.innerHTML = '<div class="alert alert-danger">' + (err.message || 'Login failed.') + '</div>';
            }
        });

        // ---- Forgot password ------------------------------------------
        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const id = prompt('Enter the real email on the account. Username-only accounts cannot self-reset - ask the admin.');
            if (!id) return;
            if (!id.includes('@')) {
                loginAlert.innerHTML = '<div class="alert alert-info">This account uses a username only - please ask the admin to reset your password.</div>';
                return;
            }
            const { error } = await supabase.auth.resetPasswordForEmail(id, {
                redirectTo: location.origin + location.pathname.replace(/[^/]*$/, '') + 'login.html',
            });
            loginAlert.innerHTML = error
                ? '<div class="alert alert-danger">' + error.message + '</div>'
                : '<div class="alert alert-success">If that email exists, a reset link has been sent.</div>';
        });
    </script>
</body>
</html>
