<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Madrasa</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='52'>☪</text></svg>">
    <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
    <div id="site-nav"></div>

    <section class="section">
        <div class="container" style="max-width: 460px">
            <div class="card" style="margin-top: 32px">
                <h1 style="margin-bottom: 4px"><span style="color: var(--gold-500)">☪</span> Sign in</h1>
                <p class="text-muted" style="margin-top: 0">Admin · Teacher · Student · Parent</p>

                <form class="form" id="login-form" style="margin-top: 20px">
                    <label>Email
                        <input required type="email" name="email" autocomplete="email">
                    </label>
                    <label>Password
                        <input required type="password" name="password" autocomplete="current-password">
                    </label>
                    <div id="login-alert"></div>
                    <button class="btn btn-primary btn-lg" type="submit" id="login-btn">Sign in</button>
                </form>

                <details style="margin-top: 18px">
                    <summary style="cursor:pointer; color: var(--green-700)">Create a new account</summary>
                    <form class="form" id="signup-form" style="margin-top: 12px">
                        <label>Full name<input required name="full_name"></label>
                        <label>Email<input required type="email" name="email"></label>
                        <label>Password (min 8 chars)<input required minlength="8" type="password" name="password"></label>
                        <label>Account type
                            <select name="role">
                                <option value="student">Student</option>
                                <option value="parent">Parent</option>
                                <option value="teacher">Teacher (admin approval required)</option>
                            </select>
                        </label>
                        <div id="signup-alert"></div>
                        <button class="btn btn-lg" type="submit">Create account</button>
                    </form>
                </details>
            </div>
            <p class="text-muted text-center" style="margin-top: 16px; font-size: 13px">
                Forgot password? <a href="#" id="forgot-link">Send reset email</a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>
    <script src="assets/js/partials.js"></script>
    <script src="assets/js/site.js"></script>
    <script src="assets/js/config.js"></script>
    <script type="module">
        import { supabase, signIn, signUp, currentProfile } from './assets/js/supabase-client.js';

        // Already logged in? Send straight to the app.
        currentProfile().then(p => { if (p) location.href = 'app.html'; });

        const loginForm = document.getElementById('login-form');
        const loginAlert = document.getElementById('login-alert');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginAlert.innerHTML = '';
            const fd = new FormData(loginForm);
            try {
                await signIn(fd.get('email'), fd.get('password'));
                location.href = 'app.html';
            } catch (err) {
                loginAlert.innerHTML = `<div class="alert alert-danger">${err.message || 'Login failed.'}</div>`;
            }
        });

        const signupForm = document.getElementById('signup-form');
        const signupAlert = document.getElementById('signup-alert');
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signupAlert.innerHTML = '';
            const fd = new FormData(signupForm);
            try {
                await signUp({
                    email: fd.get('email'),
                    password: fd.get('password'),
                    full_name: fd.get('full_name'),
                    role: fd.get('role'),
                });
                signupAlert.innerHTML = '<div class="alert alert-success">Account created. Check your email to confirm, then sign in.</div>';
                signupForm.reset();
            } catch (err) {
                signupAlert.innerHTML = `<div class="alert alert-danger">${err.message || 'Sign-up failed.'}</div>`;
            }
        });

        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Enter the email address for the account:');
            if (!email) return;
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: location.origin + '/login.html',
            });
            loginAlert.innerHTML = error
                ? `<div class="alert alert-danger">${error.message}</div>`
                : '<div class="alert alert-success">If that email exists, a reset link has been sent.</div>';
        });
    </script>
</body>
</html>
